<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskApp — Lista de Tarefas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    header p {
      color: #888;
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .form-card {
      background: #fff;
      border-radius: 14px;
      border: 0.5px solid #ddd;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .form-card input, .form-card textarea {
      width: 100%;
      border: 0.5px solid #ddd;
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a18;
      background: #fafaf8;
      margin-bottom: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-card input:focus, .form-card textarea:focus {
      border-color: #7f77dd;
    }

    .form-card textarea { resize: none; height: 70px; }

    .form-card button {
      width: 100%;
      background: #534ab7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .form-card button:hover { background: #3c3489; }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .stat {
      flex: 1;
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      text-align: center;
    }

    .stat span { display: block; font-size: 1.5rem; font-weight: 600; }
    .stat label { font-size: 0.78rem; color: #888; margin-top: 2px; display: block; }

    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: opacity 0.2s;
    }

    .task-item.done { opacity: 0.5; }
    .task-item.done .task-title { text-decoration: line-through; color: #999; }

    .task-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #7f77dd;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .task-item.done .task-checkbox {
      background: #7f77dd;
      border-color: #7f77dd;
    }

    .task-checkbox::after {
      content: '✓';
      color: white;
      font-size: 11px;
      display: none;
    }

    .task-item.done .task-checkbox::after { display: block; }

    .task-body { flex: 1; }
    .task-title { font-size: 0.95rem; font-weight: 500; margin-bottom: 2px; }
    .task-desc { font-size: 0.82rem; color: #888; }

    .task-delete {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    .task-delete:hover { color: #e24b4a; }

    .empty {
      text-align: center;
      padding: 2rem;
      color: #aaa;
      font-size: 0.95rem;
    }

    .loading { text-align: center; color: #888; padding: 2rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>📋 TaskApp</h1>
    <p>Organize suas tarefas com simplicidade</p>
  </header>

  <div class="container">
    <div class="form-card">
      <input type="text" id="title" placeholder="Nome da tarefa..." maxlength="100" />
      <textarea id="description" placeholder="Descrição (opcional)..."></textarea>
      <button onclick="criarTarefa()">+ Adicionar tarefa</button>
    </div>

    <div class="stats">
      <div class="stat">
        <span id="total">0</span>
        <label>Total</label>
      </div>
      <div class="stat">
        <span id="pendentes">0</span>
        <label>Pendentes</label>
      </div>
      <div class="stat">
        <span id="concluidas">0</span>
        <label>Concluídas</label>
      </div>
    </div>

    <div class="task-list" id="task-list">
      <div class="loading">Carregando tarefas...</div>
    </div>
  </div>

  <script>
    const API = '/api/tasks';

    async function carregarTarefas() {
      try {
        const res = await fetch(API);
        const tarefas = await res.json();
        renderizarTarefas(tarefas);
      } catch {
        document.getElementById('task-list').innerHTML = '<div class="empty">Erro ao carregar. Tente recarregar a página.</div>';
      }
    }

    function renderizarTarefas(tarefas) {
      const lista = document.getElementById('task-list');
      document.getElementById('total').textContent = tarefas.length;
      document.getElementById('concluidas').textContent = tarefas.filter(t => t.done).length;
      document.getElementById('pendentes').textContent = tarefas.filter(t => !t.done).length;

      if (!tarefas.length) {
        lista.innerHTML = '<div class="empty">Nenhuma tarefa ainda. Adicione uma acima!</div>';
        return;
      }

      lista.innerHTML = tarefas.map(t => `
        <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
          <div class="task-checkbox" onclick="alternarTarefa(${t.id}, ${!t.done})"></div>
          <div class="task-body">
            <div class="task-title">${escapar(t.title)}</div>
            ${t.description ? `<div class="task-desc">${escapar(t.description)}</div>` : ''}
          </div>
          <button class="task-delete" onclick="apagarTarefa(${t.id})" title="Apagar">✕</button>
        </div>
      `).join('');
    }

    async function criarTarefa() {
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      if (!title) { alert('Digite o nome da tarefa!'); return; }

      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description }),
      });

      document.getElementById('title').value = '';
      document.getElementById('description').value = '';
      carregarTarefas();
    }

    async function alternarTarefa(id, done) {
      await fetch(`${API}/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ done }),
      });
      carregarTarefas();
    }

    async function apagarTarefa(id) {
      if (!confirm('Apagar esta tarefa?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      carregarTarefas();
    }

    function escapar(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    carregarTarefas();
  </script>
</body>
</html>
